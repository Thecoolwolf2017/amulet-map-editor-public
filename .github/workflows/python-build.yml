name: Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: Amulet-Map-Editor-0.10.49

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10 x64
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: x64

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel pyinstaller~=6.18
        python -m pip install -e . -c constraints.txt

    - name: PyInstaller build
      run: |
        built_path=Amulet-${{ github.event.release.tag_name }}-$RUNNER_OS-x64.zip
        echo "BUILT_PATH=$built_path" >> $GITHUB_ENV
        python -m PyInstaller -y Amulet.spec

    - name: Code sign executables
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: Amulet-Map-Editor-0.10.49
      env:
        WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
        WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
        WINDOWS_SIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}
      run: |
        $timestamp = if ($env:WINDOWS_SIGN_TIMESTAMP_URL) { $env:WINDOWS_SIGN_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
        $certPath = Join-Path $env:RUNNER_TEMP "code_signing.pfx"
        $certPassword = $env:WINDOWS_SIGN_CERT_PASSWORD

        if ($env:WINDOWS_SIGN_CERT_BASE64 -and $certPassword) {
          Write-Host "Using repository signing certificate secrets."
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_BASE64))
        } else {
          Write-Host "No signing secrets found; generating self-signed cert for this build."
          $certPassword = [Guid]::NewGuid().ToString("N")
          $secure = ConvertTo-SecureString -String $certPassword -AsPlainText -Force
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Amulet Self Signed" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(1) `
            -KeyExportPolicy Exportable
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $secure | Out-Null
        }

        $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
          Sort-Object FullName -Descending |
          Select-Object -First 1).FullName
        if (-not $signtool) { throw "signtool.exe not found" }

        & $signtool sign /fd SHA256 /td SHA256 /tr $timestamp /f $certPath /p $certPassword dist/Amulet/amulet_app.exe
        & $signtool sign /fd SHA256 /td SHA256 /tr $timestamp /f $certPath /p $certPassword dist/Amulet/amulet_app_debug.exe

    - name: Package zip
      run: |
        cd dist
        7z a $BUILT_PATH Amulet
        cd ..

    - name: Upload release zip
      uses: softprops/action-gh-release@v2
      with:
        files: ./Amulet-Map-Editor-0.10.49/dist/${{ env.BUILT_PATH }}

    - name: Upload artifact copy
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILT_PATH }}
        path: ./Amulet-Map-Editor-0.10.49/dist/${{ env.BUILT_PATH }}
